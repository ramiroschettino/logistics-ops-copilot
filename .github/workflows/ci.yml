name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python data/seed.py
      - name: Tests (modo demo, sin API key)
        run: python -m pytest tests -q
        env:
          DEMO_MODE: "true"
      - name: Eval de routing y tools
        run: python eval/eval_agent.py
        env:
          DEMO_MODE: "true"
